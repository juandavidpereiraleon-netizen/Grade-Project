{% extends "base.html" %}

{% block title %}Registro - Metafiance{% endblock %}

{% block main_class %}container-main{% endblock %}


{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="card wide-card">
            <div class="card-header text-center">
                <h3 class="no-wrap">Registro de Usuario</h3>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label for="nombre_padre" class="form-label">Nombre del Padre</label>
                        <input type="text" class="form-control w-100" id="nombre_padre" name="nombre_padre" required>
                    </div>
                    <div class="mb-3">
                        <label for="nombre_estudiante" class="form-label">Nombre del Estudiante</label>
                        <input type="text" class="form-control w-100" id="nombre_estudiante" name="nombre_estudiante" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control w-100" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control w-100" id="password" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label for="curso" class="form-label">Curso</label>
                        <select class="form-select w-100" id="curso" name="curso" required>
                            <option value="">Seleccionar curso</option>
                            {% for curso in cursos %}
                            <option value="{{ curso }}">{{ curso }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="promocion" class="form-label">Promoción</label>
                        <select class="form-select w-100" id="promocion" name="promocion" required>
                            <option value="">Seleccionar promoción</option>
                            {% for promocion in promociones %}
                            <option value="{{ promocion }}">{{ promocion }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-grid gap-3">
                        <button type="submit" class="btn btn-primary btn-lg">Registrarme</button>
                        <a href="{{ url_for('index') }}" class="btn btn-secondary btn-lg">Volver al inicio</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
